repos:
  - repo: local
    hooks:
      - id: check-deps
        name: Check 3rd-party dependencies
        entry: python3 scripts/check_3rdparty_deps.py
        language: system
        types: [python]
        files: ^src/
        pass_filenames: true

      - id: ruff-format
        name: Ruff Format
        entry: ruff format .
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-check
        name: Ruff Check (Fix)
        entry: ruff check --fix .
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest-coverage
        name: Run Pytest Coverage
        entry: env PYTHONPATH=../ml-switcheroo-compiler/src:../zero-jax/src:../zero-optax/src:src python3 -m pytest --cov=src --cov-report=term-missing
        language: system

        types: [python]
        pass_filenames: false

      - id: update-badges
        name: Update Coverage Shields
        entry: python3 scripts/update_badges.py
        language: system

        types: [python]
        pass_filenames: false

      - id: check-api-compliance
        name: Check API Conformance
        entry: env PYTHONPATH=src:../ml-switcheroo-compiler/src python3 scripts/check_compliance.py
        language: system
        files: ^(SEMANTIC_PLAN\.md|src/.*\.py)$
        pass_filenames: false

      - id: check-api-parity
        name: Check API Parity against Snapshot
        entry: env PYTHONPATH=src python3 scripts/check_api_parity.py
        language: system
        files: ^(src/.*\.py|chex_api_snapshot\.json|scripts/check_api_parity\.py)$
        pass_filenames: false

      - id: check-test-parity
        name: Check Test Coverage against Snapshot
        entry: env PYTHONPATH=src python3 scripts/check_test_parity.py
        language: system
        files: ^(src/.*\.py|tests/.*\.py|chex_api_snapshot\.json|scripts/check_test_parity\.py)$
        pass_filenames: false
