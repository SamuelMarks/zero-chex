repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: Ruff Format
        entry: ruff format .
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-check
        name: Ruff Check (Fix)
        entry: ruff check --fix .
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest-coverage
        name: Run Pytest Coverage
        entry: env PYTHONPATH=src pytest --cov=src --cov-report=term-missing
        language: python
        additional_dependencies: [pytest, pytest-cov, hypothesis, coverage, "file:///Users/samuel/repos/ml-switcheroo-compiler", "file:///Users/samuel/repos/zero-jax"]
        types: [python]
        pass_filenames: false

      - id: update-badges
        name: Update Coverage Shields
        entry: python scripts/update_badges.py
        language: python
        additional_dependencies: [coverage, interrogate]
        types: [python]
        pass_filenames: false
